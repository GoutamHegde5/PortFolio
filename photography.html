  <script>
    // Shared cursor effect.
    // This enables the same cursor aura + trail on the photography page.

    (function () {
      const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const coarsePointer = window.matchMedia("(pointer: coarse)").matches;
      if (prefersReduced || coarsePointer) return;

      let cursorAura = null;
      const cursorTrailCount = 14;
      const cursorState = {
        x: window.innerWidth / 2,
        y: window.innerHeight / 2,
        targetX: window.innerWidth / 2,
        targetY: window.innerHeight / 2,
        angle: 0,
        speed: 0,
        isVisible: false,
        isResting: true
      };
      let cursorTrails = [];
      let cursorIdleTimer = null;

      function animate() {
        const prevX = cursorState.x;
        const prevY = cursorState.y;

        cursorState.x += (cursorState.targetX - cursorState.x) * 0.22;
        cursorState.y += (cursorState.targetY - cursorState.y) * 0.22;
        const vx = cursorState.x - prevX;
        const vy = cursorState.y - prevY;
        cursorState.speed = Math.min(Math.hypot(vx, vy), 34);

        if (cursorState.speed > 0.08) {
          cursorState.angle = Math.atan2(vy, vx);
        }

        if (cursorAura) {
          cursorAura.style.opacity = cursorState.isVisible && !cursorState.isResting ? "1" : "0";
          const auraStretch = 1 + cursorState.speed * 0.012;
          const auraSquash = Math.max(0.82, 1 - cursorState.speed * 0.006);
          cursorAura.style.transform = `translate3d(${cursorState.x}px, ${cursorState.y}px, 0) rotate(${cursorState.angle}rad) scale(${auraStretch}, ${auraSquash})`;
        }

        let followX = cursorState.x;
        let followY = cursorState.y;

        cursorTrails.forEach((t, idx) => {
          const pull = Math.max(0.16, 0.34 - idx * 0.011);
          t.x += (followX - t.x) * pull;
          t.y += (followY - t.y) * pull;

          const trailStretch = 1 + cursorState.speed * 0.02;
          const trailSquash = Math.max(0.68, 1 - cursorState.speed * 0.006);
          const trailScale = 1 - idx * 0.018;

          t.element.style.transform = `translate3d(${t.x}px, ${t.y}px, 0) rotate(${cursorState.angle}rad) scale(${trailStretch * trailScale}, ${trailSquash * trailScale})`;
          t.element.classList.toggle("is-visible", cursorState.isVisible && !cursorState.isResting);
          t.element.classList.toggle("is-resting", cursorState.isResting);

          followX = t.x;
          followY = t.y;
        });

        window.requestAnimationFrame(animate);
      }

      function setup() {
        cursorAura = document.createElement("span");
        cursorAura.className = "cursor-aura";
        cursorAura.setAttribute("aria-hidden", "true");
        document.body.appendChild(cursorAura);

        cursorTrails = Array.from({ length: cursorTrailCount }, (_, index) => {
          const trail = document.createElement("span");
          trail.className = "cursor-trail";
          trail.style.transitionDelay = `${index * 12}ms`;
          trail.style.setProperty("--snake-size", `${Math.max(8, 30 - index * 1.45)}px`);
          trail.style.setProperty("--snake-opacity", `${Math.max(0.16, 0.7 - index * 0.035)}`);
          trail.setAttribute("aria-hidden", "true");
          document.body.appendChild(trail);
          return { element: trail, x: cursorState.x, y: cursorState.y };
        });

        window.requestAnimationFrame(animate);
      }

      setup();

      window.addEventListener("pointermove", (event) => {
        cursorState.targetX = event.clientX;
        cursorState.targetY = event.clientY;
        cursorState.isVisible = true;
        cursorState.isResting = false;

        document.body.style.setProperty("--cursor-x", `${event.clientX}px`);
        document.body.style.setProperty("--cursor-y", `${event.clientY}px`);

        window.clearTimeout(cursorIdleTimer);
        cursorIdleTimer = window.setTimeout(() => {
          cursorState.isResting = true;
        }, 520);
      });

      window.addEventListener("pointerleave", () => {
        cursorState.isVisible = false;
        cursorState.isResting = true;
        if (cursorAura) cursorAura.style.opacity = "0";
        cursorTrails.forEach((t) => t.element.classList.remove("is-visible"));
      });
    })();

    const backLink = document.getElementById('back-to-portfolio');

    if (backLink) {
      backLink.addEventListener('click', () => {
        sessionStorage.setItem('portfolioReturnAnimation', 'photography');
      });
    }

    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const lightboxClose = document.getElementById('lightbox-close');
    const zoomInButton = document.getElementById('lightbox-zoom-in');
    const zoomOutButton = document.getElementById('lightbox-zoom-out');
    const zoomResetButton = document.getElementById('lightbox-zoom-reset');
    const galleryImages = document.querySelectorAll('.photo-card img');
    let zoomLevel = 1;
    let panX = 0;
    let panY = 0;
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragOriginX = 0;
    let dragOriginY = 0;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function protectImages() {
      document.querySelectorAll('img').forEach((image) => {
        image.setAttribute('draggable', 'false');
        image.addEventListener('contextmenu', (event) => event.preventDefault());
        image.addEventListener('dragstart', (event) => event.preventDefault());
      });

      document.addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        if ((event.ctrlKey || event.metaKey) && (key === 's' || key === 'u')) {
          event.preventDefault();
        }
      });
    }

    function applyImageTransform() {
      if (!lightboxImage) {
        return;
      }
      lightboxImage.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
      lightboxImage.classList.toggle('is-zoomed', zoomLevel > 1);
    }

    function resetZoom() {
      zoomLevel = 1;
      panX = 0;
      panY = 0;
      applyImageTransform();
    }

    function openLightbox(imageElement) {
      if (!lightbox || !lightboxImage) {
        return;
      }
      lightboxImage.src = imageElement.currentSrc || imageElement.src;
      lightboxImage.alt = imageElement.alt || 'Selected gallery image';
      resetZoom();
      lightbox.classList.add('is-open');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      if (!lightbox || !lightboxImage) {
        return;
      }
      lightbox.classList.remove('is-open');
      lightbox.setAttribute('aria-hidden', 'true');
      lightboxImage.src = '';
      resetZoom();
      document.body.style.overflow = '';
    }

    galleryImages.forEach((img) => {
      img.style.cursor = 'zoom-in';
      img.addEventListener('click', () => openLightbox(img));
    });

    protectImages();

    if (lightboxClose) {
      lightboxClose.addEventListener('click', closeLightbox);
    }

    if (lightbox) {
      lightbox.addEventListener('click', (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });

      lightbox.addEventListener('wheel', (event) => {
        if (!lightbox.classList.contains('is-open')) {
          return;
        }
        event.preventDefault();
        const delta = event.deltaY < 0 ? 0.12 : -0.12;
        zoomLevel = clamp(zoomLevel + delta, 1, 4);
        if (zoomLevel === 1) {
          panX = 0;
          panY = 0;
        }
        applyImageTransform();
      }, { passive: false });
    }

    if (zoomInButton) {
      zoomInButton.addEventListener('click', () => {
        zoomLevel = clamp(zoomLevel + 0.2, 1, 4);
        applyImageTransform();
      });
    }

    if (zoomOutButton) {
      zoomOutButton.addEventListener('click', () => {
        zoomLevel = clamp(zoomLevel - 0.2, 1, 4);
        if (zoomLevel === 1) {
          panX = 0;
          panY = 0;
        }
        applyImageTransform();
      });
    }

    if (zoomResetButton) {
      zoomResetButton.addEventListener('click', resetZoom);
    }

    if (lightboxImage) {
      lightboxImage.addEventListener('dblclick', () => {
        if (zoomLevel === 1) {
          zoomLevel = 2;
        } else {
          zoomLevel = 1;
          panX = 0;
          panY = 0;
        }
        applyImageTransform();
      });

      lightboxImage.addEventListener('pointerdown', (event) => {
        if (zoomLevel <= 1) {
          return;
        }
        isDragging = true;
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragOriginX = panX;
        dragOriginY = panY;
        lightboxImage.setPointerCapture(event.pointerId);
      });

      lightboxImage.addEventListener('pointermove', (event) => {
        if (!isDragging || zoomLevel <= 1) {
          return;
        }
        panX = dragOriginX + (event.clientX - dragStartX);
        panY = dragOriginY + (event.clientY - dragStartY);
        applyImageTransform();
      });

      lightboxImage.addEventListener('pointerup', (event) => {
        if (!isDragging) {
          return;
        }
        isDragging = false;
        lightboxImage.releasePointerCapture(event.pointerId);
      });
    }

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeLightbox();
      }
    });
  </script>
